<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Editorial · Sá Moraes Engenharia PE/PB</title>
<style>
  :root{
    --navy:#07295F; --navy-deep:#041F4A; --gold:#D69A2A; --gold-light:#F1B13B;
    --bg:#F4F6F9; --card:#FFFFFF; --border:#E2E7EE; --text:#1E2A38; --muted:#66758A;
    --stories:#8E5BD9; --feed:#1877C9; --reels:#D9455B;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:'Segoe UI',Arial,sans-serif;}
  header{background:linear-gradient(135deg,var(--navy),var(--navy-deep)); color:#fff; padding:20px 24px; position:sticky; top:0; z-index:200; box-shadow:0 4px 14px rgba(0,0,0,.18);}
  header h1{margin:0 0 4px; font-size:20px;}
  header p{margin:0; font-size:13px; color:#c9d3e0;}
  .topbar{max-width:1200px; margin:0 auto; display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between;}
  .header-actions{display:flex; align-items:center; gap:10px;}
  .export-btn{border:none; background:var(--gold); color:var(--navy-deep); padding:9px 18px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer;}
  .export-btn:hover{background:var(--gold-light);}
  .import-btn{border:1px solid rgba(255,255,255,.35); background:transparent; color:#c9d3e0; padding:6px 12px; border-radius:8px; font-size:11px; font-weight:600; cursor:pointer; opacity:.75;}
  .import-btn:hover{opacity:1; color:#fff; border-color:#fff;}
  .novo-btn{border:1px solid rgba(255,255,255,.35); background:transparent; color:#c9d3e0; padding:8px 14px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer;}
  .novo-btn:hover{opacity:1; color:#fff; border-color:#fff; background:rgba(255,255,255,.08);}

  /* UTILITY DIALOGS (export/import/novo) */
  .util-backdrop{position:fixed; inset:0; background:rgba(4,20,50,.55); display:none; align-items:center; justify-content:center; z-index:300; padding:16px;}
  .util-backdrop.active{display:flex;}
  .util-modal{background:#fff; width:100%; max-width:420px; border-radius:14px; padding:22px 24px 24px;}
  .util-modal h3{margin:0 0 14px; font-size:16px; color:var(--navy);}
  .util-modal input[type=text]{width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:13.5px; margin-bottom:16px;}
  .util-modal .btn-row{display:flex; gap:10px; flex-wrap:wrap;}
  .util-modal .btn-row button{flex:1; border:none; padding:11px 14px; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer;}
  .util-modal .btn-row button:disabled{opacity:.45; cursor:not-allowed;}
  .util-modal .opt-primary{background:var(--navy); color:#fff;}
  .util-modal .opt-secondary{background:#eef1f5; color:var(--navy);}
  .util-modal .opt-cancel{background:transparent; color:var(--muted); font-weight:600;}
  .session-list{max-height:340px; overflow-y:auto; margin-top:4px;}
  .session-item{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:11px 12px; border:1px solid var(--border); border-radius:9px; margin-bottom:8px; cursor:pointer;}
  .session-item:hover{border-color:var(--gold); background:#fffaf0;}
  .session-item .s-name{font-weight:700; font-size:13px; color:var(--navy);}
  .session-item .s-time{font-size:11.5px; color:var(--muted);}
  .util-empty{font-size:13px; color:var(--muted); padding:10px 0;}
  .view-toggle{display:flex; gap:6px; background:rgba(255,255,255,.12); padding:4px; border-radius:10px;}
  .view-toggle button{border:none; background:transparent; color:#fff; padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer;}
  .view-toggle button.active{background:var(--gold); color:var(--navy-deep);}
  .wrap{max-width:1200px; margin:0 auto; padding:20px 16px 60px;}

  .toolbar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:18px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 14px;}
  .toolbar input[type=text]{flex:1; min-width:180px; padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:13.5px;}
  .chip{border:1px solid var(--border); background:#fff; padding:6px 12px; border-radius:20px; font-size:12.5px; cursor:pointer; user-select:none; font-weight:600; color:var(--muted);}
  .chip.active-stories{background:var(--stories); color:#fff; border-color:var(--stories);}
  .chip.active-feed{background:var(--feed); color:#fff; border-color:var(--feed);}
  .chip.active-reels{background:var(--reels); color:#fff; border-color:var(--reels);}
  select{padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-size:13px; color:var(--text); background:#fff;}
  .legend-btn{border:1px solid var(--gold); background:#fff; color:#8a6300; padding:7px 14px; border-radius:20px; font-size:12.5px; font-weight:600; cursor:pointer;}

  .legend-panel{display:none; background:#fffaf0; border:1px solid var(--gold-light); border-radius:12px; padding:14px 16px; margin-bottom:18px; font-size:12.5px; line-height:1.7;}
  .legend-panel.open{display:block;}
  .legend-panel b{color:#8a6300;}
  .legend-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:4px 18px;}

  .tag{display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; color:#fff; letter-spacing:.02em;}
  .tag.Stories{background:var(--stories);}
  .tag.Feed{background:var(--feed);}
  .tag.Reels{background:var(--reels);}
  .pub-badge{display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; background:var(--navy); color:#fff; font-size:11px; font-weight:700;}

  /* LIST VIEW */
  #listView .date-group{margin-bottom:22px;}
  #listView .date-head{font-size:13px; font-weight:700; color:var(--navy); margin-bottom:8px; padding-bottom:6px; border-bottom:2px solid var(--gold); display:flex; align-items:center; gap:10px;}
  .post-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px;}
  .post-card{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; cursor:pointer; transition:.15s; display:flex; flex-direction:column; gap:8px;}
  .post-card:hover{border-color:var(--gold); box-shadow:0 4px 14px rgba(7,41,95,.10); transform:translateY(-2px);}
  .post-card .row1{display:flex; justify-content:space-between; align-items:center;}
  .post-card .seg{font-size:14px; font-weight:700; color:var(--navy); line-height:1.3;}
  .post-card .gancho{font-size:12.5px; color:var(--muted); line-height:1.5;}
  .post-card .foot{display:flex; justify-content:space-between; align-items:center; margin-top:auto; font-size:11px; color:var(--muted);}

  /* CALENDAR VIEW */
  #calView{display:none;}
  #calView.active{display:block;}
  .month-block{margin-bottom:34px;}
  .month-title{font-size:16px; font-weight:700; color:var(--navy); margin-bottom:12px;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
  .cal-dow{font-size:11px; font-weight:700; color:var(--muted); text-align:center; padding-bottom:4px; text-transform:uppercase;}
  .cal-day{background:var(--card); border:1px solid var(--border); border-radius:10px; min-height:86px; padding:6px 6px; display:flex; flex-direction:column; gap:3px; cursor:default;}
  .cal-day.empty{background:transparent; border:none;}
  .cal-day.has-posts{cursor:pointer;}
  .cal-day.has-posts:hover{border-color:var(--gold); box-shadow:0 2px 8px rgba(7,41,95,.10);}
  .cal-day .num{font-size:12px; font-weight:700; color:var(--navy);}
  .cal-day .dots{display:flex; flex-wrap:wrap; gap:3px; margin-top:2px;}
  .cal-dot{width:9px; height:9px; border-radius:50%;}
  .cal-dot.Stories{background:var(--stories);}
  .cal-dot.Feed{background:var(--feed);}
  .cal-dot.Reels{background:var(--reels);}
  .cal-day .more{font-size:10px; color:var(--muted);}

  /* AGENDA (mobile fallback for calendar) */
  #agendaView{display:none;}
  .agenda-day{background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:8px; cursor:pointer;}
  .agenda-day .d{font-size:12.5px; font-weight:700; color:var(--navy); margin-bottom:6px;}
  .agenda-day .items{display:flex; flex-wrap:wrap; gap:6px;}

  /* MODAL */
  .backdrop{position:fixed; inset:0; background:rgba(4,20,50,.55); display:none; align-items:flex-start; justify-content:center; z-index:100; padding:26px 14px; overflow-y:auto;}
  .backdrop.active{display:flex;}
  .modal{background:#fff; max-width:760px; width:100%; border-radius:14px; padding:26px 26px 30px; position:relative; margin-top:10px;}
  .modal .close{position:absolute; top:16px; right:16px; border:none; background:#eef1f5; width:32px; height:32px; border-radius:50%; font-size:15px; cursor:pointer; color:var(--muted);}
  .modal h2{font-size:19px; color:var(--navy); margin:6px 0 4px; padding-right:36px;}
  .modal .meta-row{display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:16px;}
  .modal .url-link{display:inline-block; margin-bottom:16px; font-size:12.5px; word-break:break-all; color:var(--feed); text-decoration:none; background:#eef4fc; padding:8px 12px; border-radius:8px;}
  .modal .url-link:hover{text-decoration:underline;}
  .field{margin-bottom:14px;}
  .field .lbl{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--gold-light); background:#fbf3e2; display:inline-block; padding:2px 8px; border-radius:6px; margin-bottom:5px;}
  .field .val{font-size:13.5px; line-height:1.6; color:var(--text); white-space:pre-line;}
  .field .val[contenteditable="true"]{outline:2px dashed var(--gold); outline-offset:4px; border-radius:6px; padding:4px 6px; background:#fffdf5; cursor:text;}
  .field .suggestion{margin-top:8px; padding:8px 10px; background:#fdeeee; border-left:3px solid #c0392b; border-radius:6px;}
  .field .suggestion .sug-lbl{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:#c0392b; margin-bottom:3px;}
  .field .suggestion .sug-txt{font-size:13px; line-height:1.6; color:#c0392b; white-space:pre-line;}
  .edit-toolbar{display:flex; gap:10px; margin:4px 0 18px;}
  .edit-toolbar button{border:none; padding:8px 16px; border-radius:8px; font-size:12.5px; font-weight:700; cursor:pointer;}
  .btn-suggest{background:#fbf3e2; color:#8a6300; border:1px solid var(--gold-light) !important;}
  .btn-save{background:#1e7a44; color:#fff;}
  .btn-cancel{background:#eef1f5; color:var(--muted);}
  .extra-block{margin-top:20px; padding-top:16px; border-top:1px dashed var(--border);}
  .extra-block h3{font-size:14px; color:var(--navy); margin-bottom:10px;}
  .slide-row{display:grid; grid-template-columns:70px 1fr; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-size:12.5px;}
  .slide-row b{color:var(--navy);}
  .daylist-item{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 14px; border:1px solid var(--border); border-radius:10px; margin-bottom:8px; cursor:pointer;}
  .daylist-item:hover{border-color:var(--gold);}

  footer{text-align:center; font-size:11.5px; color:var(--muted); padding:20px;}

  @media (max-width:760px){
    .cal-grid{display:none;}
    #agendaView{display:block;}
    .modal{padding:20px 16px 24px; border-radius:10px;}
  }
</style>
</head>
<body>

<header>
  <div class="topbar">
    <button class="novo-btn" onclick="confirmNovo()">↺ Novo</button>
    <div>
      <h1>Calendário Editorial · Sá Moraes Engenharia PE/PB</h1>
      <p>51 posts · 20/07 a 23/08/2026 · Stories, Feed e Reels por segmento</p>
    </div>
    <div class="header-actions">
      <button class="export-btn" onclick="openExportDialog()">Exportar</button>
      <button class="import-btn" onclick="openImportDialog()">Importar</button>
      <input type="file" id="importFile" accept=".txt" style="display:none" onchange="importSuggestions(event)">
    </div>
    <div class="view-toggle">
      <button id="btnList" class="active" onclick="setView('list')">Lista</button>
      <button id="btnCal" onclick="setView('cal')">Calendário</button>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="toolbar">
    <input type="text" id="searchBox" placeholder="Buscar por segmento, gancho ou tema..." oninput="renderAll()">
    <span class="chip" id="chipStories" onclick="toggleFormato('Stories')">Stories</span>
    <span class="chip" id="chipFeed" onclick="toggleFormato('Feed')">Feed</span>
    <span class="chip" id="chipReels" onclick="toggleFormato('Reels')">Reels</span>
    <select id="pubFilter" onchange="renderAll()"><option value="">Todos os públicos</option></select>
    <button class="legend-btn" onclick="toggleLegend()">Legenda de públicos ▾</button>
  </div>

  <div class="legend-panel" id="legendPanel">
    <b>Legenda de Público-alvo</b>
    <div class="legend-grid" id="legendGrid"></div>
  </div>

  <div id="listView"></div>

  <div id="calView">
    <div id="calGridsContainer"></div>
    <div id="agendaView"></div>
  </div>

</div>

<footer>Sá Moraes Engenharia · Calendário editorial de captação PE/PB · clique em qualquer post para ver o conteúdo completo</footer>

<div class="backdrop" id="backdrop" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBody"></div>
</div>

<div class="util-backdrop" id="utilBackdrop" onclick="if(event.target===this)closeUtilModal()">
  <div class="util-modal" id="utilModalBody"></div>
</div>

ombeiros tem procedimentos, sistemas e particularidades. Para empresas em João Pessoa, é importante entender o enquadramento e as exigências do CBMPB antes de iniciar. Isso evita caminho errado e acelera decisões técnicas.", "CTA final": "Fale com a Sá Moraes sobre AVCB em João Pessoa.", "B-roll sugerido": "Orla/edificações JP, condomínios, hotelaria, documentos técnicos.", "Tom": "Especialista acessível. Seguro, claro, sem marketing agressivo."}, "Landing / Hub PE-PB": {"Título": "Reels 10: Diagnóstico técnico antes da regularização", "Público-alvo": "Empresas e responsáveis por edificações em PE/PB", "Duração": "30-45s", "Abertura/gancho": "Antes de contratar a primeira etapa da regularização, existe uma pergunta que precisa ser respondida primeiro: qual é o enquadramento real da sua edificação.", "Roteiro falado": "Muitas empresas em Pernambuco e na Paraíba começam a regularização pedindo orçamento ou reunindo documentos, sem antes entender o uso da edificação, a área construída, a ocupação e o risco envolvido. Esse diagnóstico prévio é o que define se o caminho é AVCB, CLCB ou PPCI, e qual a complexidade real do processo. Sem esse levantamento, o retrabalho aparece na forma de exigência do Corpo de Bombeiros, prazo estourado ou documento incompleto. A Sá Moraes conduz esse diagnóstico técnico antes do início da execução, avaliando a edificação como ela é hoje.", "CTA final": "Solicite um diagnóstico técnico para sua edificação em PE ou PB.", "B-roll sugerido": "Fachada comercial genérica, engenheiro com prancheta analisando planta, checklist técnico, mapa de Pernambuco e Paraíba.", "Tom": "Especialista acessível. Técnico, claro e direto, sem marketing agressivo."}, "AVCB em Pernambuco": {"Título": "Reels 11: O AVCB vem no fim do processo técnico", "Público-alvo": "Empresários, gestores e síndicos em PE", "Duração": "30-45s", "Abertura/gancho": "O AVCB não é o documento que se pede primeiro. Ele é o resultado de um processo técnico conduzido corretamente antes da o status do protocolo realmente significa", "Público-alvo": "Quem tem protocolo, pendência ou documento", "Duração": "30-45s", "Abertura/gancho": "Ver \"em análise\" ou \"pendência\" no sistema do Corpo de Bombeiros não explica o que precisa ser corrigido, só que algo precisa ser corrigido.", "Roteiro falado": "O sistema do CBMPE registra o andamento do protocolo, mas a leitura técnica desse status exige entender qual exigência gerou a pendência, se ela é documental, de projeto ou de execução, e qual o prazo para resposta. Tratar esse status como um simples aviso, sem investigar a causa técnica, prolonga o processo e pode levar ao arquivamento do protocolo. Interpretar corretamente essa informação é o que permite corrigir o ponto certo antes do prazo vencer.", "CTA final": "Tem um protocolo parado ou com pendência no CBMPE?", "B-roll sugerido": "Tela de sistema/protocolo (mockup), engenheiro analisando documento, calendário com prazo, prédio ao fundo.", "Tom": "Especialista acessível. Técnico, claro e direto, sem marketing agressivo."}, "Clínicas": {"Título": "Reels 14: Por que uma clínica não segue o projeto de uma loja", "Público-alvo": "Clínicas e consultórios", "Duração": "30-45s", "Abertura/gancho": "Uma clínica com paciente em maca e uma loja de rua não podem seguir o mesmo raciocínio de rota de fuga.", "Roteiro falado": "Em ambientes de saúde, parte do público não se desloca sozinha em uma emergência, o que muda a lógica de dimensionamento das rotas de fuga e o tempo necessário para evacuação. Somam-se a isso gases medicinais, áreas críticas e a necessidade de manter parte da operação funcionando mesmo durante uma ocorrência. Quando o projeto de segurança trata a clínica como um comércio comum, a exigência real do Corpo de Bombeiros aparece só na vistoria, exigindo ajustes que poderiam ter sido previstos desde o projeto.", "CTA final": "Sua clínica já teve esse risco avaliado tecnicamente?", "B-roll sugerido": "Corredor de clínica com maca, sinalização de rota de fuga, cilindro de gás medicinal, recepção de consultório.", "Tom": "Especialista acessível. Técnico, claro e direto, sem marketing agressivo."}, "Indústrias": {"Título": "Reels 15: Regularização industrial não termina no PPCI aprovado", "Público-alvo": "Indústrias e operações complexas", "Duração": "30-45s", "Abertura/gancho": "Em uma planta industrial, o PPCI aprovado é só uma parte do que sustenta a operação segura no dia a dia.", "Roteiro falado": "Indústrias lidam com auditorias de seguradora, exigências de proteção ativa e passiva, e documentação que precisa se manter coerente mesmo quando a operação muda de layout, equipamento ou processo produtivo. A Sá Moraes conduz o diagnóstico técnico dessas operações complexas, avaliando desde o dimensionamento das medidas de proteção até a governança documental que sustenta seguro, auditoria e vistoria ao longo do tempo, e não apenas no momento da aprovação inicial.", "CTA final": "Solicite um diagnóstico técnico para sua operação industrial.", "B-roll sugerido": "Galpão industrial, hidrante de incêndio, painel de sprinklers, engenheiro em EPI analisando planta industrial.", "Tom": "Especialista acessível. Técnico, claro e direto, sem marketing agressivo."}, "AVCB Olinda": {"Título": "Reels 16: Regularizar um casarão não é como regularizar um prédio novo", "Público-alvo": "Pousadas, restaurantes, casarões e comércios em Olinda", "Duração": "30-45s", "Abertura/gancho": "Um casarão tombado em Olinda não pode simplesmente instalar um sistema de combate a incêndio padrão na fachada ou na estrutura original.", "Roteiro falado": "Imóveis históricos têm restrições de intervenção que limitam onde e como tubulações, sinalização e sistemas de detecção podem ser instalados, sem descaracterizar o patrimônio. Ignorar essa restrição na fase de projeto leva a soluções que a vistoria recusa, ou a intervenções que comprometem a estrutura original. O caminho correto é projetar a segurança contra incêndio considerando, desde o início const posts = BUNDLE.posts;
const pubLabel = BUNDLE.pubLabel;
const reelsBySeg = BUNDLE.reelsBySeg;
const carrosselBySeg = BUNDLE.carrosselBySeg;

// reverse label -> full text
const labelToPub = {};
Object.entries(pubLabel).forEach(([full,letter]) => labelToPub[letter] = full);

let state = { view: 'list', formatos: new Set(), pub: '', search: '' };

// ---- Suggested edits (review mode) ----
const SUG_KEY = 'sme_calendario_suggestions_v1';
let suggestions = {};
try{ suggestions = JSON.parse(localStorage.getItem(SUG_KEY) || '{}'); }catch(e){ suggestions = {}; }
function persistSuggestions(){ try{ localStorage.setItem(SUG_KEY, JSON.stringify(suggestions)); }catch(e){} }

let editMode = false;
let currentPostIdx = null;

const MAIN_FIELDS = [
  ['pub','Público-alvo'], ['dor','Dor / Intenção'], ['gancho','Gancho'],
  ['objetivo','Objetivo do post'], ['estrutura','Estrutura'], ['textoArte','Texto da arte'],
  ['legenda','Legenda / copy'], ['cta','CTA'], ['prompt','Prompt generativo de imagem'],
  ['tom','Tom obrigatório'], ['status','Status']
];

// populate público filter dropdown
const pubSelect = document.getElementById('pubFilter');
Object.entries(pubLabel).sort((a,b)=>a[1].localeCompare(b[1])).forEach(([full,letter])=>{
  const opt = document.createElement('option');
  opt.value = letter;
  opt.textContent = `Público ${letter} — ${full}`;
  pubSelect.appendChild(opt);
});

// legend
const legendGrid = document.getElementById('legendGrid');
Object.entries(pubLabel).sort((a,b)=>a[1].localeCompare(b[1])).forEach(([full,letter])=>{
  const div = document.createElement('div');
  div.innerHTML = `<span class="pub-badge">${letter}</span> &nbsp;${full}`;
  legendGrid.appendChild(div);
});

function toggleLegend(){ document.getElementById('legendPanel').classList.toggle('open'); }

function toggleFormato(f){
  const chip = document.getElementById('chip'+f);
  if(state.formatos.has(f)){ state.formatos.delete(f); chip.classList.remove('active-'+f.toLowerCase()); }
  else { state.formatos.add(f); chip.classList.add('active-'+f.toLowerCase()); }
  renderAll();
}

function setView(v){
  state.view = v;
  document.getElementById('btnList').classList.toggle('active', v==='list');
  document.getElementById('btnCal').classList.toggle('active', v==='cal');
  document.getElementById('listView').style.display = v==='list' ? 'block' : 'none';
  document.getElementById('calView').classList.toggle('active', v==='cal');
  renderAll();
}

function filteredPosts(){
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  return posts.filter(p => {
    if(state.formatos.size && !state.formatos.has(p['Formato'])) return false;
    if(state.pub && pubLabel[p['Público-alvo']] !== state.pub) return false;
    if(q){
      const hay = (p['Segmento/Página']+' '+p['Gancho']+' '+p['Dor/Intenção']).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderAll(){
  state.pub = document.getElementById('pubFilter').value;
  if(state.view === 'list') renderList(); else renderCalendar();
}

function fmtDate(iso){
  const [y,m,d] = iso.split('-');
  const dias = ['dom','seg','ter','qua','qui','sex','sáb'];
  const dt = new Date(+y, +m-1, +d);
  return `${d}/${m}/${y} · ${dias[dt.getDay()]}`;
}

function renderList(){
  const container = document.getElementById('listView');
  const list = filteredPosts();
  const byDate = {};
  list.forEach(p => { (byDate[p['Data']] = byDate[p['Data']] || []).push(p); });
  const dates = Object.keys(byDate).sort();
  if(!dates.length){ container.innerHTML = '<p style="color:#66758A;padding:20px 0;">Nenhum post encontrado com esses filtros.</p>'; return; }
  container.innerHTML = dates.map(date => {
    const items = byDate[date];
    const cards = items.map(p => postCardHtml(p)).join('');
    return `<div class="date-group"><div class="date-head">${fmtDate(date)}</div><div class="post-grid">${cards}</div></div>`;
  }).join('');
}

function postCardHtml(p){
  const letter = pubLabel[p['Público-alvo']];
  const idx = posts.indexOf(p);
  return `<div class="post-card" onclick="openPost(${idx})">
    <div class="row1"><span class="tag ${p['Formato']}">${p['Formato']}</span><span class="pub-badge" title="${p['Público-alvo']}">${letter}</span></div>
    <div class="seg">${p['Segmento/Página']}</div>
    <div class="gancho">${p['Gancho']}</div>
    <div class="foot"><span>${p['Semana']}</span><span>Ver detalhes →</span></div>
  </div>`;
}

const MONTHS = [
  {year:2026, month:7, label:"Julho 2026"},
  {year:2026, month:8, label:"Agosto 2026"},
];
const DOW = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function renderCalendar(){
  const list = filteredPosts();
  const byDate = {};
  list.forEach(p => { (byDate[p['Data']] = byDate[p['Data']] || []).push(p); });

  const gridsHtml = MONTHS.map(({year,month,label}) => {
    const first = new Date(year, month-1, 1);
    const daysInMonth = new Date(year, month, 0).getDate();
    const startDow = first.getDay();
    let cells = '';
    for(let i=0;i<startDow;i++) cells += `<div class="cal-day empty"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const iso = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayPosts = byDate[iso] || [];
      const hasPosts = dayPosts.length>0;
      const dots = dayPosts.slice(0,6).map(p=>`<span class="cal-dot ${p['Formato']}" title="${p['Formato']}"></span>`).join('');
      cells += `<div class="cal-day ${hasPosts?'has-posts':''}" ${hasPosts?`onclick="openDay('${iso}')"`:''}>
        <div class="num">${d}</div>
        <div class="dots">${dots}</div>
      </div>`;
    }
    return `<div class="month-block"><div class="month-title">${label}</div>
      <div class="cal-grid">${DOW.map(dw=>`<div class="cal-dow">${dw}</div>`).join('')}${cells}</div>
    </div>`;
  }).join('');
  document.getElementById('calGridsContainer').innerHTML = gridsHtml;

  // agenda (mobile fallback)
  const dates = Object.keys(byDate).sort();
  document.getElementById('agendaView').innerHTML = dates.map(date => {
    const items = byDate[date];
    const tags = items.map(p=>`<span class="tag ${p['Formato']}">${p['Formato']}</span>`).join('');
    return `<div class="agenda-day" onclick="openDay('${date}')"><div class="d">${fmtDate(date)} · ${items.length} post(s)</div><div class="items">${tags}</div></div>`;
  }).join('');
}

function openDay(iso){
  const list = filteredPosts().filter(p => p['Data'] === iso);
  if(list.length === 1){ openPost(posts.indexOf(list[0])); return; }
  const modal = document.getElementById('modalBody');
  modal.innerHTML = `<button class="close" onclick="closeModal()">✕</button>
    <h2>${fmtDate(iso)}</h2>
    <p style="font-size:12.5px;color:#66758A;margin-bottom:16px;">${list.length} posts nesta data. Clique para ver o conteúdo completo.</p>
    ${list.map(p => {
      const idx = posts.indexOf(p);
      return `<div class="daylist-item" onclick="openPost(${idx})">
        <div><span class="tag ${p['Formato']}">${p['Formato']}</span> &nbsp; <b>${p['Segmento/Página']}</b></div>
        <span style="color:#66758A;font-size:12px;">Ver →</span>
      </div>`;
    }).join('')}`;
  document.getElementById('backdrop').classList.add('active');
}

function field(label, value, key){
  if(!value) return '';
  const idx = currentPostIdx;
  const sug = (key && idx!=null && suggestions[idx] && suggestions[idx][key]) ? suggestions[idx][key] : '';
  const editableAttr = editMode && key ? ` contenteditable="true" data-key="${key}"` : '';
  // ao entrar em modo de edição, parte da última sugestão salva (se existir) em vez do texto original,
  // para não perder edições anteriores.
  const displayValue = (editMode && sug) ? sug : value;
  const sugHtml = (sug && !editMode) ? `<div class="suggestion"><div class="sug-lbl">Sugestão de edição</div><div class="sug-txt">${sug}</div></div>` : '';
  return `<div class="field"><div class="lbl">${label}</div><div class="val"${editableAttr}>${displayValue}</div>${sugHtml}</div>`;
}

function openPost(idx){
  currentPostIdx = idx;
  editMode = false;
  renderPostModal();
  document.getElementById('backdrop').classList.add('active');
}

function renderPostModal(){
  const idx = currentPostIdx;
  const p = posts[idx];
  const letter = pubLabel[p['Público-alvo']];
  let extra = '';

  if(p['Formato'] === 'Reels' && reelsBySeg[p['Segmento/Página']]){
    const r = reelsBySeg[p['Segmento/Página']];
    extra = `<div class="extra-block"><h3>Roteiro completo do Reels</h3>
      ${field('Duração', r['Duração'], 'reelsDuracao')}
      ${field('Abertura / gancho', r['Abertura/gancho'], 'reelsAbertura')}
      ${field('Roteiro falado', r['Roteiro falado'], 'reelsRoteiro')}
      ${field('CTA final', r['CTA final'], 'reelsCta')}
      ${field('B-roll sugerido', r['B-roll sugerido'], 'reelsBroll')}
    </div>`;
  }

  if(p['Formato'] === 'Feed' && carrosselBySeg[p['Segmento/Página']]){
    const slides = carrosselBySeg[p['Segmento/Página']];
    const combined = slides.map(s => `[${s['Tipo']}] ${s['Texto da arte']}`).join('\n');
    extra = `<div class="extra-block"><h3>Carrossel sugerido (5 slides)</h3>
      ${field('Carrossel (todos os slides)', combined, 'carrossel')}
    </div>`;
  }

  const modal = document.getElementById('modalBody');
  modal.innerHTML = `<button class="close" onclick="closeModal()">✕</button>
    <div class="meta-row">
      <span class="tag ${p['Formato']}">${p['Formato']}</span>
      <span class="pub-badge">${letter}</span>
      <span style="font-size:12.5px;color:#66758A;">${fmtDate(p['Data'])} · ${p['Semana']}</span>
    </div>
    <h2>${p['Segmento/Página']}</h2>
    <a class="url-link" href="${p['URL de apoio']}" target="_blank" rel="noopener">${p['URL de apoio']}</a>
    <div class="edit-toolbar">
      ${editMode
        ? `<button class="btn-save" onclick="saveEdits()">Salvar</button><button class="btn-cancel" onclick="cancelEdits()">Cancelar</button>`
        : `<button class="btn-suggest" onclick="enterEditMode()">✎ Sugerir edições</button>`}
    </div>
    ${field('Público-alvo (Público '+letter+')', p['Público-alvo'], 'pub')}
    ${field('Dor / Intenção', p['Dor/Intenção'], 'dor')}
    ${field('Gancho', p['Gancho'], 'gancho')}
    ${field('Objetivo do post', p['Objetivo do post'], 'objetivo')}
    ${field('Estrutura', p['Estrutura'], 'estrutura')}
    ${field('Texto da arte', p['Texto da arte'], 'textoArte')}
    ${field('Legenda / copy', p['Legenda/copy'], 'legenda')}
    ${field('CTA', p['CTA'], 'cta')}
    ${field('Prompt generativo de imagem', p['Prompt generativo de imagem'], 'prompt')}
    ${field('Tom obrigatório', p['Tom obrigatório'], 'tom')}
    ${field('Status', p['Status'], 'status')}
    ${extra}
  `;
}

function enterEditMode(){ editMode = true; renderPostModal(); }

function cancelEdits(){ editMode = false; renderPostModal(); }

function saveEdits(){
  const idx = currentPostIdx;
  const modal = document.getElementById('modalBody');
  const vals = modal.querySelectorAll('.val[data-key]');
  if(!suggestions[idx]) suggestions[idx] = {};
  vals.forEach(el => {
    const key = el.getAttribute('data-key');
    const text = el.innerText.trim();
    const originalVal = getOriginalFieldText(idx, key);
    if(text && text !== originalVal.trim()){
      suggestions[idx][key] = text;
    } else {
      delete suggestions[idx][key];
    }
  });
  if(Object.keys(suggestions[idx]).length === 0) delete suggestions[idx];
  persistSuggestions();
  editMode = false;
  renderPostModal();
}

// ---- Integração com Google Sheets ----
const SHEET_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwmo6mojWV38ee-OMiV73-cNjfEcHokQV03I0owAzCBIOtA38EchghwlUUP6VLiU8Vp/exec';
const EDITOR_NAME_KEY = 'sme_calendario_editor_name';

function lastUsedName(){ return localStorage.getItem(EDITOR_NAME_KEY) || ''; }
function rememberName(name){ localStorage.setItem(EDITOR_NAME_KEY, name); }

function slug(str){
  return (str||'')
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^a-zA-Z0-9]+/g,'_')
    .replace(/^_+|_+$/g,'') || 'anonimo';
}

function timestampLabel(d){
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
}

// ---- "Novo" (zerar respostas) ----
function confirmNovo(){
  if(confirm('Isso vai apagar todas as sugestões de edição salvas neste navegador (não afeta o que já foi salvo na nuvem). Deseja continuar?')){
    suggestions = {};
    persistSuggestions();
    if(document.getElementById('backdrop').classList.contains('active')) closeModal();
    renderAll();
  }
}

// ---- Diálogos utilitários ----
function openUtilModal(html){
  document.getElementById('utilModalBody').innerHTML = html;
  document.getElementById('utilBackdrop').classList.add('active');
}
function closeUtilModal(){ document.getElementById('utilBackdrop').classList.remove('active'); }
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeUtilModal(); });

// ---- Exportar ----
function openExportDialog(){
  openUtilModal(`
    <h3>Exportar sugestões</h3>
    <p class="util-empty" style="margin:-6px 0 10px;">Digite seu nome para liberar as opções de exportação.</p>
    <input type="text" id="exportName" placeholder="Seu nome" value="" oninput="updateExportButtons()" required>
    <div class="btn-row">
      <button class="opt-secondary" id="btnExportTxt" disabled onclick="doExportTxt()">Salvar .txt</button>
      <button class="opt-primary" id="btnExportOnline" disabled onclick="doExportOnline()">Salvar online</button>
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button class="opt-cancel" onclick="closeUtilModal()">Cancelar</button>
    </div>
  `);
  const input = document.getElementById('exportName');
  updateExportButtons();
  setTimeout(() => input.focus(), 0);
}

function updateExportButtons(){
  const input = document.getElementById('exportName');
  const hasName = input && input.value.trim().length > 0;
  const disabled = !hasName;
  const btnTxt = document.getElementById('btnExportTxt');
  const btnOnline = document.getElementById('btnExportOnline');
  if(btnTxt) btnTxt.disabled = disabled;
  if(btnOnline) btnOnline.disabled = disabled;
}

function getExportName(){
  const input = document.getElementById('exportName');
  const name = (input && input.value.trim()) || 'Anônimo';
  rememberName(name);
  return name;
}

function doExportTxt(){
  const name = getExportName();
  exportSuggestions(name);
  closeUtilModal();
}

function doExportOnline(){
  const name = getExportName();
  const body = document.getElementById('utilModalBody');
  body.innerHTML = '<h3>Enviando...</h3><p class="util-empty">Salvando sugestões na planilha, aguarde.</p>';
  sendSnapshotToSheet(name)
    .then(() => {
      body.innerHTML = '<h3>Salvo!</h3><p class="util-empty">Suas sugestões foram enviadas para a nuvem.</p><div class="btn-row"><button class="opt-primary" onclick="closeUtilModal()">OK</button></div>';
    })
    .catch(err => {
      console.warn(err);
      body.innerHTML = '<h3>Erro ao salvar</h3><p class="util-empty">Não foi possível enviar para a planilha. Verifique sua conexão.</p><div class="btn-row"><button class="opt-cancel" onclick="closeUtilModal()">Fechar</button></div>';
    });
}

function sendSnapshotToSheet(name){
  const sessionId = slug(name) + '_' + timestampLabel(new Date());
  const sessLabel = new Date().toLocaleString('pt-BR');
  const postsPayload = posts.map((p, idx) => {
    const keys = fieldKeysForPost(p);
    const changes = {};
    keys.forEach(key => {
      const label = EXPORT_FIELD_LABELS[key] || key;
      const original = getOriginalFieldText(idx, key) || '';
      const sug = (suggestions[idx] && suggestions[idx][key]) || '';
      changes[key] = { label, original, sugestao: sug };
    });
    return {
      postId: idx, data: p['Data'], dow: diaSemana(p['Data']),
      tipo: p['Formato'], titulo: p['Segmento/Página'], changes
    };
  });
  const payload = { editor: name, sessionId, sessionLabel: sessLabel, posts: postsPayload };
  return fetch(SHEET_WEBAPP_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
}

// ---- Importar ----
function openImportDialog(){
  openUtilModal(`
    <h3>Importar sugestões</h3>
    <div class="btn-row">
      <button class="opt-secondary" onclick="closeUtilModal(); document.getElementById('importFile').click();">Importar .txt</button>
      <button class="opt-primary" onclick="openCloudImportList()">Importar da nuvem</button>
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button class="opt-cancel" onclick="closeUtilModal()">Cancelar</button>
    </div>
  `);
}

function openCloudImportList(){
  const body = document.getElementById('utilModalBody');
  body.innerHTML = '<h3>Importar da nuvem</h3><p class="util-empty">Carregando lista de salvamentos...</p>';
  fetch(SHEET_WEBAPP_URL + '?action=list')
    .then(r => r.json())
    .then(json => {
      if(json.status !== 'ok' || !json.sessions){ throw new Error('resposta inválida'); }
      if(!json.sessions.length){
        body.innerHTML = '<h3>Importar da nuvem</h3><p class="util-empty">Nenhum salvamento encontrado ainda.</p><div class="btn-row"><button class="opt-cancel" onclick="closeUtilModal()">Fechar</button></div>';
        return;
      }
      const items = json.sessions.map(s => `
        <div class="session-item" onclick="loadSessionFromCloud('${s.sessionId}')">
          <div><div class="s-name">${s.editor}</div><div class="s-time">${s.timestamp}</div></div>
          <span style="color:#66758A;font-size:12px;">Importar →</span>
        </div>`).join('');
      body.innerHTML = `<h3>Escolha um salvamento</h3><div class="session-list">${items}</div>
        <div class="btn-row" style="margin-top:10px;"><button class="opt-cancel" onclick="closeUtilModal()">Cancelar</button></div>`;
    })
    .catch(err => {
      console.warn(err);
      body.innerHTML = '<h3>Erro</h3><p class="util-empty">Não foi possível carregar a lista da nuvem.</p><div class="btn-row"><button class="opt-cancel" onclick="closeUtilModal()">Fechar</button></div>';
    });
}

function loadSessionFromCloud(sessionId){
  const body = document.getElementById('utilModalBody');
  body.innerHTML = '<h3>Importando...</h3><p class="util-empty">Carregando sugestões, aguarde.</p>';
  fetch(SHEET_WEBAPP_URL + '?action=load&sessionId=' + encodeURIComponent(sessionId))
    .then(r => r.json())
    .then(json => {
      if(json.status !== 'ok' || !json.data){ throw new Error('resposta inválida'); }
      let count = 0;
      Object.keys(json.data).forEach(postId => {
        const idx = parseInt(postId, 10);
        Object.keys(json.data[postId]).forEach(key => {
          const entry = json.data[postId][key];
          if(entry.sugestao){
            if(!suggestions[idx]) suggestions[idx] = {};
            suggestions[idx][key] = entry.sugestao;
            count++;
          }
        });
      });
      persistSuggestions();
      if(currentPostIdx !== null && document.getElementById('backdrop').classList.contains('active')){
        renderPostModal();
      }
      renderAll();
      closeUtilModal();
      alert('Importação concluída: ' + count + ' campo(s) atualizados.');
    })
    .catch(err => {
      console.warn(err);
      body.innerHTML = '<h3>Erro</h3><p class="util-empty">Não foi possível importar este salvamento.</p><div class="btn-row"><button class="opt-cancel" onclick="closeUtilModal()">Fechar</button></div>';
    });
}

function getOriginalFieldText(idx, key){
  const p = posts[idx];
  const map = {
    pub:p['Público-alvo'], dor:p['Dor/Intenção'], gancho:p['Gancho'], objetivo:p['Objetivo do post'],
    estrutura:p['Estrutura'], textoArte:p['Texto da arte'], legenda:p['Legenda/copy'], cta:p['CTA'],
    prompt:p['Prompt generativo de imagem'], tom:p['Tom obrigatório'], status:p['Status']
  };
  if(map.hasOwnProperty(key)) return map[key] || '';
  if(p['Formato']==='Reels' && reelsBySeg[p['Segmento/Página']]){
    const r = reelsBySeg[p['Segmento/Página']];
    const rmap = {reelsDuracao:r['Duração'], reelsAbertura:r['Abertura/gancho'], reelsRoteiro:r['Roteiro falado'], reelsCta:r['CTA final'], reelsBroll:r['B-roll sugerido']};
    if(rmap.hasOwnProperty(key)) return rmap[key] || '';
  }
  if(p['Formato']==='Feed' && carrosselBySeg[p['Segmento/Página']] && key==='carrossel'){
    return carrosselBySeg[p['Segmento/Página']].map(s => `[${s['Tipo']}] ${s['Texto da arte']}`).join('\n');
  }
  return '';
}

function hasUnsavedChanges(){
  const idx = currentPostIdx;
  if(idx == null) return false;
  const modal = document.getElementById('modalBody');
  const vals = modal.querySelectorAll('.val[data-key]');
  for(const el of vals){
    const key = el.getAttribute('data-key');
    const text = el.innerText.trim();
    const originalVal = (getOriginalFieldText(idx, key) || '').trim();
    const existingSug = (suggestions[idx] && suggestions[idx][key]) || '';
    const savedVal = existingSug || originalVal;
    if(text !== savedVal) return true;
  }
  return false;
}

function closeModal(){
  if(editMode){
    if(hasUnsavedChanges()){
      const wantsSave = confirm('Você tem edições não salvas neste post. Deseja salvar antes de sair?');
      if(wantsSave){ saveEdits(); } else { editMode = false; }
    } else {
      editMode = false;
    }
  }
  document.getElementById('backdrop').classList.remove('active');
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

// ---- Export / Import de sugestões ----
const EXPORT_FIELD_LABELS = {
  pub:'Público-alvo', dor:'Dor / Intenção', gancho:'Gancho', objetivo:'Objetivo do post',
  estrutura:'Estrutura', textoArte:'Texto da arte', legenda:'Legenda / copy', cta:'CTA',
  prompt:'Prompt generativo de imagem', tom:'Tom obrigatório', status:'Status',
  reelsDuracao:'Duração (Reels)', reelsAbertura:'Abertura/gancho (Reels)', reelsRoteiro:'Roteiro falado (Reels)',
  reelsCta:'CTA final (Reels)', reelsBroll:'B-roll sugerido (Reels)', carrossel:'Carrossel (todos os slides)'
};

function fieldKeysForPost(p){
  const keys = ['pub','dor','gancho','objetivo','estrutura','textoArte','legenda','cta','prompt','tom','status'];
  if(p['Formato']==='Reels' && reelsBySeg[p['Segmento/Página']]){
    keys.push('reelsDuracao','reelsAbertura','reelsRoteiro','reelsCta','reelsBroll');
  }
  if(p['Formato']==='Feed' && carrosselBySeg[p['Segmento/Página']]){
    keys.push('carrossel');
  }
  return keys;
}

function diaSemana(iso){
  const [y,m,d] = iso.split('-');
  const dias = ['dom','seg','ter','qua','qui','sex','sáb'];
  return dias[new Date(+y,+m-1,+d).getDay()];
}

function exportSuggestions(editorName){
  const name = editorName || 'Anônimo';
  const now = new Date();
  const lines = [];
  lines.push('CALENDÁRIO EDITORIAL SME PE/PB — RESPOSTAS DE REVISÃO');
  lines.push('Revisor: ' + name);
  lines.push('Exportado em: ' + now.toLocaleString('pt-BR'));
  lines.push('='.repeat(70));
  lines.push('');

  posts.forEach((p, idx) => {
    const dia = p['Data'].split('-')[2];
    const mes = p['Data'].split('-')[1];
    const dow = diaSemana(p['Data']);
    lines.push(`###POST id=${idx} data=${p['Data']} dia=${dia} mes=${mes} dow=${dow} tipo=${p['Formato']} titulo="${p['Segmento/Página']}"`);
    lines.push(`--- ${dia}/${mes} · ${dow} · ${p['Formato']} · ${p['Segmento/Página']} ---`);
    const keys = fieldKeysForPost(p);
    const postSug = suggestions[idx] || {};
    keys.forEach(key => {
      const label = EXPORT_FIELD_LABELS[key] || key;
      const original = getOriginalFieldText(idx, key) || '(vazio)';
      const sug = postSug[key];
      lines.push(`##CAMPO chave=${key} label="${label}"`);
      lines.push('ORIGINAL:');
      lines.push(original);
      lines.push('SUGESTAO:');
      lines.push(sug ? sug : '(não respondido)');
      lines.push('##FIM');
    });
    lines.push('###FIM POST');
    lines.push('');
  });

  const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `calendario_editorial_${slug(name)}_${timestampLabel(now)}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function importSuggestions(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    parseImportedText(e.target.result);
    event.target.value = '';
  };
  reader.readAsText(file, 'utf-8');
}

function parseImportedText(text){
  const lines = text.split(/\r?\n/);
  let i = 0;
  let currentIdx = null;
  let imported = 0;
  while(i < lines.length){
    const line = lines[i];
    const postMatch = line.match(/^###POST id=(\d+)/);
    if(postMatch){
      currentIdx = parseInt(postMatch[1], 10);
      i++;
      continue;
    }
    const campoMatch = line.match(/^##CAMPO chave=(\S+)/);
    if(campoMatch && currentIdx !== null){
      const key = campoMatch[1];
      i++;
      // skip to ORIGINAL:
      while(i < lines.length && lines[i] !== 'ORIGINAL:') i++;
      i++; // move past ORIGINAL:
      let originalLines = [];
      while(i < lines.length && lines[i] !== 'SUGESTAO:'){ originalLines.push(lines[i]); i++; }
      i++; // move past SUGESTAO:
      let sugLines = [];
      while(i < lines.length && lines[i] !== '##FIM'){ sugLines.push(lines[i]); i++; }
      const sugText = sugLines.join('\n').trim();
      if(sugText && sugText !== '(não respondido)'){
        if(!suggestions[currentIdx]) suggestions[currentIdx] = {};
        suggestions[currentIdx][key] = sugText;
      }
      imported++;
      i++; // move past ##FIM
      continue;
    }
    i++;
  }
  persistSuggestions();
  if(currentPostIdx !== null && document.getElementById('backdrop').classList.contains('active')){
    renderPostModal();
  }
  renderAll();
  alert('Importação concluída: ' + imported + ' campo(s) processado(s).');
}

renderAll();
